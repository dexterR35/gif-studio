name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  js-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run check:openapi
      - run: npm run build

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install web API deps
        run: |
          python -m pip install -U pip
          pip install -r requirements-web.txt -r requirements-dev.txt
          pip install -e .
      - name: Pytest
        run: pytest tests/test_engine.py tests/test_cli.py tests/test_api_v1_jobs.py -q
      - name: UI smoke (optional PySide)
        run: pytest tests/test_ui_smoke.py -q
        continue-on-error: true
